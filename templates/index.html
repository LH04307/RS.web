<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RS Ratings • Relative Strength</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .tesla-bg { background: linear-gradient(180deg, #0a0a0a, #111111); }
    .accent-cyan { color: #00f5d4; }
    table { border-collapse: collapse; }
    th, td { padding: 12px 16px; }
    tr:hover { background: #1a1a1a; }
  </style>
</head>
<body class="tesla-bg text-white min-h-screen">

<div class="max-w-7xl mx-auto p-6">
  <header class="flex justify-between items-center mb-10">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-rocket text-3xl accent-cyan"></i>
      <h1 class="text-4xl font-bold tracking-tighter">RS RATINGS</h1>
    </div>
    <div class="flex items-center gap-4">
      <button onclick="refreshData()" 
              class="px-6 py-3 bg-white text-black font-semibold rounded-full hover:bg-gray-200 transition">
        <i class="fa-solid fa-arrows-rotate"></i> Refresh
      </button>
      <button onclick="exportCSV()" 
              class="px-6 py-3 border border-white/70 font-semibold rounded-full hover:bg-white/10 transition">
        <i class="fa-solid fa-download"></i> Export CSV
      </button>
    </div>
  </header>

  <!-- Filters -->
  <div class="bg-zinc-900 border border-white/10 rounded-3xl p-6 mb-8">
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
      <div>
        <label class="block text-xs uppercase tracking-widest mb-1 text-gray-400">Search</label>
        <input id="search" type="text" placeholder="Symbol or name..." 
               class="w-full bg-black border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-400">
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest mb-1 text-gray-400">Min RS</label>
        <input id="min_rs" type="number" value="70" 
               class="w-full bg-black border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-400">
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest mb-1 text-gray-400">Min Price</label>
        <input id="min_price" type="number" placeholder="$5" value="5"
               class="w-full bg-black border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-400">
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest mb-1 text-gray-400">Exchange</label>
        <select id="exchange" class="w-full bg-black border border-white/20 rounded-xl px-4 py-3">
          <option value="all">All</option>
          <option value="NASDAQ">NASDAQ</option>
          <option value="NYSE">NYSE</option>
        </select>
      </div>
      <div class="flex items-end">
        <button onclick="loadData()" 
                class="w-full h-12 bg-cyan-500 hover:bg-cyan-400 text-black font-bold rounded-2xl transition">
          Apply Filters
        </button>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div id="stats" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8"></div>

  <!-- Table -->
  <div class="bg-zinc-900 border border-white/10 rounded-3xl overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-black">
          <tr>
            <th class="text-left">Symbol</th>
            <th class="text-left">Company</th>
            <th class="text-left">Exchange</th>
            <th onclick="sortBy('rs')" class="cursor-pointer">RS <i class="fa-solid fa-sort"></i></th>
            <th onclick="sortBy('rs_mkt')" class="cursor-pointer">vs SPY</th>
            <th onclick="sortBy('price')" class="cursor-pointer">Price</th>
            <th onclick="sortBy('d1')" class="cursor-pointer">1D</th>
            <th onclick="sortBy('m1')" class="cursor-pointer">1M</th>
            <th onclick="sortBy('m3')" class="cursor-pointer">3M</th>
            <th onclick="sortBy('y1')" class="cursor-pointer">1Y</th>
          </tr>
        </thead>
        <tbody id="table-body" class="text-gray-300"></tbody>
      </table>
    </div>
  </div>

  <div class="text-center text-xs text-gray-500 mt-8">
    Last updated: <span id="last-updated"></span> • Data from Polygon.io • IBD-style Relative Strength
  </div>
</div>

<script>
let currentSort = "rs";
let currentDir = "desc";

async function loadData() {
  const q = document.getElementById('search').value;
  const min_rs = document.getElementById('min_rs').value || 70;
  const min_price = document.getElementById('min_price').value;
  const exchange = document.getElementById('exchange').value;

  let url = `/api/ratings?page=1&per_page=200&sort=${currentSort}&dir=${currentDir}&min_rs=${min_rs}`;
  if (q) url += `&q=${encodeURIComponent(q)}`;
  if (min_price) url += `&min_price=${min_price}`;
  if (exchange !== 'all') url += `&exchange=${exchange}`;

  const res = await fetch(url);
  const data = await res.json();

  renderTable(data.rows);
  renderStats(data.meta);
  document.getElementById('last-updated').textContent = new Date().toLocaleString();
}

function renderTable(rows) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  rows.forEach(r => {
    const row = `
      <tr class="border-t border-white/10 hover:bg-zinc-800/70">
        <td class="font-mono font-bold">${r.symbol}</td>
        <td class="max-w-xs truncate">${r.name}</td>
        <td>${r.exchange}</td>
        <td class="font-bold ${r.rs >= 90 ? 'text-emerald-400' : r.rs >= 80 ? 'text-cyan-400' : 'text-white'}">${r.rs}</td>
        <td>${r.rs_mkt > 0 ? '+' : ''}${r.rs_mkt}</td>
        <td>$${r.price}</td>
        <td class="${r.d1 >= 0 ? 'text-emerald-400' : 'text-red-400'}">${r.d1}%</td>
        <td class="${r.m1 >= 0 ? 'text-emerald-400' : 'text-red-400'}">${r.m1}%</td>
        <td class="${r.m3 >= 0 ? 'text-emerald-400' : 'text-red-400'}">${r.m3}%</td>
        <td class="${r.y1 >= 0 ? 'text-emerald-400' : 'text-red-400'}">${r.y1}%</td>
      </tr>`;
    tbody.innerHTML += row;
  });
}

async function renderStats(meta) {
  const statsDiv = document.getElementById('stats');
  // You can expand this with real stats from /api/stats if you want
  statsDiv.innerHTML = `
    <div class="bg-zinc-900 border border-white/10 rounded-2xl p-5">
      <div class="text-cyan-400 text-sm">TOTAL RATED</div>
      <div class="text-4xl font-bold">${meta.total || 0}</div>
    </div>
  `;
}

function sortBy(col) {
  if (currentSort === col) {
    currentDir = currentDir === "desc" ? "asc" : "desc";
  } else {
    currentSort = col;
    currentDir = "desc";
  }
  loadData();
}

async function refreshData() {
  await fetch('/api/refresh', {method: 'POST'});
  alert("Refresh started in background. Check progress in logs.");
  setTimeout(loadData, 2000);
}

async function exportCSV() {
  const q = document.getElementById('search').value;
  const min_rs = document.getElementById('min_rs').value || 70;
  let url = `/api/export?min_rs=${min_rs}&sort=${currentSort}&dir=${currentDir}`;
  if (q) url += `&q=${encodeURIComponent(q)}`;
  window.location.href = url;
}

// Initial load
window.onload = loadData;
</script>
</body>
</html>
